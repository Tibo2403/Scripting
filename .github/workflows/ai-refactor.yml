name: AI Refactor (manual)

on:
  workflow_dispatch:

concurrency:
  group: ai-refactor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ai-refactor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    env:
      OPENAI_MODEL: gpt-4.1

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Prepare tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq shellcheck

      - id: generate
        name: Ask OpenAI for a small safe patch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.OPENAI_MODEL }}
        run: |
          set -euo pipefail

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY is not configured."
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tmpctx="$(mktemp)"
          find . -type f \( \
              -name "*.py" -o \
              -name "*.ps1" -o \
              -name "*.psd1" -o \
              -name "*.psm1" -o \
              -name "*.cmd" -o \
              -name "*.sh" -o \
              -name "*.md" -o \
              -name "*.yml" -o \
              -name "*.yaml" \
            \) \
            -not -path "./.git/*" \
            -not -path "./.pytest_cache/*" \
            -not -path "./__pycache__/*" \
            -not -path "./.venv/*" \
            -not -path "./.github/workflows/ai-refactor.yml" \
            -size -200k \
            | sort \
            | head -n 30 \
            | while IFS= read -r file; do
                printf '<<<FILE:%s>>>\n' "$file" >> "$tmpctx"
                sed -e 's/\r$//' "$file" >> "$tmpctx" || true
                printf '\n<<<END>>>\n' >> "$tmpctx"
              done

          context="$(jq -Rs . < "$tmpctx")"

          body="$(jq -n \
            --arg model "$OPENAI_MODEL" \
            --arg context "$context" \
            '{
              model: $model,
              input: [
                {
                  role: "system",
                  content: "You are a senior software engineer. Return only a minimal unified git diff. Do not change public behavior, credentials, or offensive capability. Prefer docs, validation, linting, safety notes, and small bug fixes."
                },
                {
                  role: "user",
                  content: ("Repository sample as JSON string:\n" + $context + "\nReturn an empty response if no safe improvement is obvious.")
                }
              ],
              temperature: 0,
              max_output_tokens: 4096
            }')"

          curl -sS https://api.openai.com/v1/responses \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$body" \
            | jq -r '.output_text // ""' > ai.patch

          if [ -s ai.patch ] && grep -Eq '^(diff --git |--- )' ai.patch; then
            git apply --check ai.patch
            echo "has_patch=true" >> "$GITHUB_OUTPUT"
          else
            : > ai.patch
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply patch
        if: steps.generate.outputs.has_patch == 'true'
        run: |
          set -euo pipefail
          git apply --whitespace=fix ai.patch

      - name: Validate generated patch
        if: steps.generate.outputs.has_patch == 'true'
        run: |
          set -euo pipefail
          python -m compileall .
          python -m unittest discover -s scripts/python/tests -v

      - name: Validate PowerShell syntax
        if: steps.generate.outputs.has_patch == 'true'
        shell: pwsh
        run: ./scripts/powershell/Test-ScriptSyntax.ps1 -Path ./scripts

      - name: Install PSScriptAnalyzer
        if: steps.generate.outputs.has_patch == 'true'
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          foreach ($attempt in 1..3) {
            try {
              Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -ErrorAction Stop
              break
            } catch {
              if ($attempt -eq 3) {
                throw
              }
              Write-Warning "PSScriptAnalyzer installation attempt $attempt failed. Retrying..."
              Start-Sleep -Seconds 10
            }
          }

      - name: Run PSScriptAnalyzer
        if: steps.generate.outputs.has_patch == 'true'
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./scripts -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          $results | Format-Table -AutoSize
          if ($results) {
            exit 1
          }

      - name: Validate shell scripts
        if: steps.generate.outputs.has_patch == 'true'
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            bash -n "$file"
          done < <(find scripts -name "*.sh" -print0)
          find scripts -name "*.sh" -print0 | xargs -0 shellcheck --severity=error

      - name: Create pull request
        if: steps.generate.outputs.has_patch == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          title: "AI refactor"
          body: "Manual AI-assisted refactor. Review carefully before merging."
          branch: ai/refactor-${{ github.run_id }}
          commit-message: "AI refactor: automated suggestions"
          delete-branch: true
