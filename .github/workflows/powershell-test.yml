name: PowerShell Scripts Test

on:
  push:
  pull_request:

jobs:
  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          pwsh -Command Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          pwsh -Command Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          Get-ChildItem -Path './scripts/powershell' -Recurse -Include *.ps1,*.psm1,*.psd1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$($_.Extent.File):$($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
      - name: Run shellcheck
        run: shellcheck scripts/linux/*.sh
        continue-on-error: true
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path './scripts/powershell' -Recurse -Severity Error
          $results | Format-Table -AutoSize
          if ($results) {
            exit 1
          }

  test-scripts:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          Get-ChildItem -Path './scripts/powershell' -Recurse -Include *.ps1,*.psm1,*.psd1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$($_.Extent.File):$($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
