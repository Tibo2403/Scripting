name: Script Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: script-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  powershell:
    name: PowerShell validation
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate PowerShell syntax
        shell: pwsh
        run: ./scripts/powershell/Test-ScriptSyntax.ps1 -Path ./scripts

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          foreach ($attempt in 1..3) {
            try {
              Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -ErrorAction Stop
              break
            } catch {
              if ($attempt -eq 3) {
                throw
              }
              Write-Warning "PSScriptAnalyzer installation attempt $attempt failed. Retrying..."
              Start-Sleep -Seconds 10
            }
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./scripts/powershell -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          $results | Format-Table -AutoSize
          if ($results) {
            exit 1
          }

      - name: Run Codex Workspace Doctor smoke test
        shell: pwsh
        run: ./scripts/tests/Test-Optimize-CodexWorkspace.ps1

  bash:
    name: Bash validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate shell syntax
        run: |
          set -euo pipefail
          find scripts -name "*.sh" -print0 | xargs -0 -n1 bash -n

      - name: Install ShellCheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          set -euo pipefail
          find scripts -name "*.sh" -print0 | xargs -0 shellcheck --severity=error

      - name: Run Linux safety tests
        run: bash scripts/tests/test-linux-safety.sh

  python:
    name: Python validation
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate Python syntax
        run: python -m py_compile scripts/python/codex_cost_router.py scripts/python/mcp_server.py

      - name: Run Python tests
        run: python -m unittest discover -s scripts/python/tests -v
