# LiteLLM OSS self-hosted proxy for Codex.
# The config is intentionally conservative: local Ollama aliases are always
# present, while Gemini is used only through real Gemini 2.5 model ids.

model_list:
  - model_name: codex-small-local
    litellm_params:
      model: openai/phi4-mini
      api_base: http://127.0.0.1:11434/v1
      api_key: sk-ollama-local
      weight: 4

  - model_name: codex-small-local
    litellm_params:
      model: openai/qwen2.5-coder:3b
      api_base: http://127.0.0.1:11434/v1
      api_key: sk-ollama-local
      weight: 1

  - model_name: codex-phi-local
    litellm_params:
      model: openai/phi4-mini
      api_base: http://127.0.0.1:11434/v1
      api_key: sk-ollama-local
      weight: 1

  - model_name: codex-qwen-local
    litellm_params:
      model: openai/qwen2.5-coder:3b
      api_base: http://127.0.0.1:11434/v1
      api_key: sk-ollama-local
      weight: 1

  - model_name: codex-light
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      weight: 4

  - model_name: codex-light
    litellm_params:
      model: openai/phi4-mini
      api_base: http://127.0.0.1:11434/v1
      api_key: sk-ollama-local
      weight: 1

  - model_name: codex-default
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      weight: 3

  - model_name: codex-default
    litellm_params:
      model: openai/qwen2.5-coder:3b
      api_base: http://127.0.0.1:11434/v1
      api_key: sk-ollama-local
      weight: 2

  - model_name: codex-long
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY
      weight: 4

  - model_name: codex-long
    litellm_params:
      model: openai/qwen2.5-coder:3b
      api_base: http://127.0.0.1:11434/v1
      api_key: sk-ollama-local
      weight: 1

  - model_name: codex-deep
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY
      weight: 3

  - model_name: codex-deep
    litellm_params:
      model: openai/qwen2.5-coder:3b
      api_base: http://127.0.0.1:11434/v1
      api_key: sk-ollama-local
      weight: 1

  - model_name: codex-no-openai
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      weight: 3

  - model_name: codex-no-openai
    litellm_params:
      model: openai/qwen2.5-coder:3b
      api_base: http://127.0.0.1:11434/v1
      api_key: sk-ollama-local
      weight: 2

  - model_name: codex-cheap
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      weight: 3

  - model_name: codex-cheap
    litellm_params:
      model: openai/phi4-mini
      api_base: http://127.0.0.1:11434/v1
      api_key: sk-ollama-local
      weight: 1

  - model_name: codex-strong
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY
      weight: 3

  - model_name: codex-strong
    litellm_params:
      model: openai/qwen2.5-coder:3b
      api_base: http://127.0.0.1:11434/v1
      api_key: sk-ollama-local
      weight: 1

  - model_name: codex-claude-complex
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      weight: 1

  - model_name: codex-hf-cheap
    litellm_params:
      model: huggingface/groq/openai/gpt-oss-120b
      api_key: os.environ/HF_TOKEN

  - model_name: codex-hf-fast
    litellm_params:
      model: huggingface/together/openai/gpt-oss-120b
      api_key: os.environ/HF_TOKEN

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 180
  cooldown_time: 90
  enable_pre_call_checks: true
  model_group_alias:
    phi4-mini: codex-small-local
    qwen2.5-coder:3b: codex-qwen-local
    gemini-2.5-flash: codex-light
    gemini-2.5-pro: codex-long
    claude-sonnet: codex-claude-complex
  fallbacks:
    - codex-small-local:
        - codex-phi-local
        - codex-qwen-local
    - codex-phi-local:
        - codex-qwen-local
    - codex-light:
        - codex-small-local
        - codex-qwen-local
    - codex-default:
        - codex-light
        - codex-qwen-local
    - codex-long:
        - codex-default
        - codex-qwen-local
    - codex-deep:
        - codex-long
        - codex-default
        - codex-qwen-local
    - codex-no-openai:
        - codex-light
        - codex-qwen-local
    - codex-cheap:
        - codex-light
        - codex-qwen-local
    - codex-strong:
        - codex-deep
        - codex-default
        - codex-qwen-local
    - codex-claude-complex:
        - codex-deep
        - codex-default
    - codex-hf-cheap:
        - codex-light
        - codex-qwen-local
    - codex-hf-fast:
        - codex-default
        - codex-qwen-local
  context_window_fallbacks:
    - codex-small-local:
        - codex-long
    - codex-light:
        - codex-long
    - codex-default:
        - codex-long
    - codex-deep:
        - codex-long
  allowed_fails_policy:
    AuthenticationErrorAllowedFails: 0
    TimeoutErrorAllowedFails: 2
    RateLimitErrorAllowedFails: 1

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 180
  num_retries: 2

general_settings:
  master_key: os.environ/LITELLM_API_KEY
  disable_spend_logs: true
  background_health_checks: true
  health_check_interval: 60
  enable_health_check_routing: true
  health_check_ignore_transient_errors: true
