# Codex cost-routing policy.
# CLI options still have priority, then environment variables, then this file.
# Provider choices: auto, openai, gemini, huggingface, local-small, phi, qwen, claude, no-openai.
# Codex path choices: auto, standard, litellm, huggingface.
# qwen is local-only through Ollama on 127.0.0.1:11434.
# local-small/phi target small Codex tasks through Phi-4 Mini with a strict output budget.

default_provider: auto
default_codex_provider: auto
open_models_only: false
avoid_openai: false
max_cost_usd: 0.0

task_provider_rules:
  simple: local-small
  medium: auto
  complex: claude

fallback_order:
  - litellm
  - standard
  - huggingface

adaptive_router:
  enabled: false
  shadow_mode: true
  min_confidence_delta: 0.15
  overload_penalty: 0.35
  cold_start_penalty: 0.5
  performance_weight: 0.35
  min_performance_observations: 2
  cost_guard_enabled: true
  max_cost_multiplier: 2.0
  critical_risk_threshold: 0.65
  decay: 0.65
  max_history: 200
