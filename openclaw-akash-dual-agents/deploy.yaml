version: "2.0"

services:
  openclaw:
    image: ghcr.io/tibo2403/openclaw-akash-dual-agents:latest
    env:
      - DEEPINFRA_API_KEY=REPLACE_ME
      - OPENAI_API_KEY=REPLACE_ME_OPTIONAL
      - GITHUB_TOKEN=REPLACE_ME
      - TOKEN_BOT_A=REPLACE_ME
      - TOKEN_BOT_B=REPLACE_ME
      - OPENCLAW_GATEWAY_TOKEN=REPLACE_WITH_LONG_RANDOM_VALUE
      - QWEN_MODEL_ID=Qwen/Qwen3-Coder-32B-Instruct
      - DEEPSEEK_MODEL_ID=deepseek-ai/DeepSeek-V4-Flash
      - REPOSITORIES=Tibo2403/Scripting
      - TZ=Europe/Budapest
    expose:
      - port: 18789
        as: 18789
        to:
          - global: false
    params:
      storage:
        data:
          mount: /data
          readOnly: false

profiles:
  compute:
    openclaw:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 1Gi
        storage:
          - size: 1Gi
          - name: data
            size: 8Gi
            attributes:
              persistent: true
              class: beta3
  placement:
    akash:
      pricing:
        openclaw:
          denom: uact
          amount: 25

deployment:
  openclaw:
    akash:
      profile: openclaw
      count: 1
